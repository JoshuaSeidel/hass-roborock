name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    name: Prepare release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from manifest
        id: get_version
        run: |
          version=$(jq -r '.version' custom_components/roborock/manifest.json)
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Validate version matches tag
        run: |
          tag_version="${GITHUB_REF#refs/tags/v}"
          manifest_version="${{ steps.get_version.outputs.version }}"
          if [ "$tag_version" != "$manifest_version" ]; then
            echo "Version mismatch: tag v$tag_version != manifest $manifest_version"
            exit 1
          fi

      - name: Create ZIP file
        run: |
          cd custom_components/roborock
          zip -r ../../roborock-${{ steps.get_version.outputs.version }}.zip ./* -x "*.pyc" -x "__pycache__/*"

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Check if asset already exists
          if gh release view ${{ github.ref_name }} --json assets --jq '.assets[].name' | grep -q "roborock-${{ steps.get_version.outputs.version }}.zip"; then
            echo "Asset already exists, skipping upload"
          else
            gh release upload ${{ github.ref_name }} roborock-${{ steps.get_version.outputs.version }}.zip
          fi
